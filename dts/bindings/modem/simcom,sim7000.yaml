description: SIMCOM sim7000x NBIoT Modem

compatible: "simcom,sim7000"

include: uart-device.yaml

properties:
    label:
      required: true

    mdm-pwr-key-gpios:
        type: phandle-array
        required: true

    mdm-reset-gpios:
        type: phandle-array
        required: true

    mdm-status-gpios:
        type: phandle-array
        required: true

    mdm-uart-dtr-gpios:
        type: phandle-array
        required: true

    mdm-uart-ri-gpios:
        type: phandle-array
        required: true

    mdm-uart-dcd-gpios:
        type: phandle-array
        required: true

    mdm-uart-cts-gpios:
        type: phandle-array
        required: true

    mdm-uart-rts-gpios:
        type: phandle-array
        required: true
